<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미술사 탐정단: 조형사 방탈출</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a2e; color: #fff; text-align: center; margin: 0; padding: 20px; touch-action: manipulation; }
        h1 { color: #f0c987; font-size: 2em; margin-bottom: 5px; }
        .container { max-width: 1200px; margin: 0 auto; display: none; }
        
        #startScreen { margin-top: 15vh; }
        #startScreen p { font-size: 1.2em; color: #aaa; margin-bottom: 30px; line-height: 1.5; }
        input[type="text"] { padding: 15px; font-size: 1.2em; border-radius: 8px; border: 2px solid #e94560; background: #16213e; color: #fff; text-align: center; margin-bottom: 20px; width: 80%; max-width: 300px; }
        
        #stageTitle { font-size: 1.6em; color: #4ade80; margin-bottom: 20px; font-weight: bold; }
        #pool { background: #16213e; border: 3px dashed #533483; border-radius: 10px; padding: 20px; min-height: 80px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; align-items: center; }
        
        /* 활동지 표(Table) 스타일 */
        .table-wrapper { overflow-x: auto; background: #fff; border-radius: 10px; padding: 10px; }
        table { width: 100%; min-width: 800px; border-collapse: collapse; color: #333; table-layout: fixed; }
        th, td { border: 2px solid #ccc; padding: 10px; text-align: center; vertical-align: middle; word-break: keep-all; }
        th { background: #2c3e50; color: #f0c987; font-size: 1.1em; font-weight: bold; }
        th:first-child { width: 12%; }
        td.row-label { background: #e0e0e0; font-weight: bold; font-size: 1.1em; }
        
        .table-img { height: 100px; object-fit: contain; display: block; margin: 0 auto 10px auto; border-radius: 8px; }
        
        .drop-zone { min-height: 60px; height: 100%; width: 100%; display: flex; flex-direction: column; gap: 8px; align-items: center; justify-content: center; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .drop-zone.dragover { background-color: #e0f7fa; border: 2px dashed #00bcd4; }

        .item { padding: 8px 12px; border-radius: 15px; font-weight: bold; cursor: grab; user-select: none; box-shadow: 0 2px 5px rgba(0,0,0,0.5); font-size: 0.95em; transition: 0.1s; text-align: center; word-break: keep-all; }
        .item:active { cursor: grabbing; }
        .item.selected { outline: 4px solid #ff9800; transform: scale(1.1); z-index: 10; box-shadow: 0 5px 15px rgba(255,152,0,0.8); }
        .type-A { background-color: #ffebee; border: 2px solid #f44336; color: #c62828; }
        .type-B { background-color: #e3f2fd; border: 2px solid #2196f3; color: #1565c0; }
        .type-C { background-color: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32; }
        
        .btn-wrap { margin-top: 30px; }
        button { padding: 15px 40px; font-size: 1.2em; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; transition: 0.2s; }
        .start-btn { background-color: #e94560; color: white; box-shadow: 0 5px 0 #b02a42; font-size: 1.5em; }
        .start-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #b02a42; }
        
        /* 버튼 디자인 상태별 변경을 위한 기본 클래스 설정 제거 (JS에서 직접 조작) */
        #checkBtn { background-color: #4caf50; color: white; box-shadow: 0 4px 0 #388e3c; }
        #checkBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #388e3c; }
        
        .correct { background-color: #c8e6c9 !important; border-color: #4caf50 !important; color: #2e7d32 !important; }
        .wrong { animation: shake 0.4s; border-color: #f44336 !important; opacity: 0.8; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>🕵️‍♂️ 조형사 방탈출 퍼즐</h1>
        <p>조원들과 힘을 합쳐 표의 빈칸을 정확히 채워보세요!<br>PC는 드래그, 태블릿은 <b>[단어 터치] 👉 [빈칸 터치]</b></p>
        <input type="text" id="groupName" placeholder="조 이름을 입력하세요 (예: 1조)" autocomplete="off"><br>
        <button class="start-btn" onclick="startGame()">🔥 탈출 시작!</button>
    </div>

    <div class="container" id="gameArea">
        <div id="stageTitle"></div>
        <div id="pool"></div>
        <div class="table-wrapper" id="tableContainer"></div>
        <div class="btn-wrap">
            <button id="checkBtn">✅ 정답 확인</button>
        </div>
    </div>

    <script>
        // ★ 선생님의 파이어베이스 설정값으로 변경하세요 ★
        const firebaseConfig = {
            apiKey: "AIzaSyALlQNFjwj6YFOHbdSfsNdnAoYje3HpHL4",
            authDomain: "art-funding.firebaseapp.com",
            databaseURL: "https://art-funding-default-rtdb.firebaseio.com",
            projectId: "art-funding",
            storageBucket: "art-funding.firebasestorage.app",
            messagingSenderId: "976837369403",
            appId: "1:976837369403:web:8c71defb3a8919cc82c61e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentStage = 0;
        let selectedItem = null;
        let groupName = "";
        let isStageCleared = false; // 🔥 정답 확인 모드를 위한 상태 변수 추가

        const stages = [
            {
                title: "🔒 1단계: 시대를 품은 불상",
                headers: ["구분", "금동반가사유상", "석굴암 본존불", "관촉사 석조미륵보살입상"],
                images: ["", "금동반가사유상.png", "석굴암본존불.png", "관촉사석조미륵보살입상.png"],
                rows: [
                    { label: "시기", cells: [ ["6~7세기"], ["8세기"], ["10~11세기"] ] },
                    { label: "자세", cells: [ ["반가부좌"], ["결가부좌"], ["입상"] ] },
                    { label: "대좌", cells: [ ["연화대좌 (연꽃)"], ["연화대좌 (연꽃)"], ["대좌 없음"] ] },
                    { label: "특징", cells: [ ["온화한 미소", "숭고미"], ["균형 잡힌 신체", "이상미 (완벽)"], ["과장된 얼굴", "파격적, 대범함"] ] }
                ],
                keywords: [
                    { t: '6~7세기', c: 'type-A' }, { t: '8세기', c: 'type-A' }, { t: '10~11세기', c: 'type-A' },
                    { t: '반가부좌', c: 'type-B' }, { t: '결가부좌', c: 'type-B' }, { t: '입상', c: 'type-B' },
                    { t: '연화대좌 (연꽃)', c: 'type-B' }, { t: '연화대좌 (연꽃)', c: 'type-B' }, { t: '대좌 없음', c: 'type-B' },
                    { t: '온화한 미소', c: 'type-C' }, { t: '균형 잡힌 신체', c: 'type-C' }, { t: '과장된 얼굴', c: 'type-C' },
                    { t: '숭고미', c: 'type-C' }, { t: '이상미 (완벽)', c: 'type-C' }, { t: '파격적, 대범함', c: 'type-C' }
                ]
            },
            {
                title: "🔒 2단계: 신라와 고려의 탑",
                headers: ["구분", "불국사 석가탑", "불국사 다보탑", "월정사 팔각구층석탑", "경천사지 십층석탑"],
                images: ["", "불국사석가탑.png", "불국사다보탑.png", "월정사팔각구층석탑.png", "경천사지십층석탑.png"],
                rows: [
                    { label: "시기", cells: [ ["8세기"], ["8세기"], ["10~11세기"], ["14세기"] ] },
                    { label: "재료", cells: [ ["화강암"], ["화강암"], ["돌, 금동"], ["대리석"] ] },
                    { label: "기단/탑신", cells: [ ["2단 3층"], ["층 구분 없음 (2단)"], ["1단 9층"], ["3단 10층"] ] },
                    { label: "특징", cells: [ ["모범적 석탑", "단순함 (남성적)"], ["이형탑", "장식적 (여성적)"], ["고려 귀족적", "다각다층"], ["라마교 영향", "파격적인 형태"] ] }
                ],
                keywords: [
                    { t: '8세기', c: 'type-A' }, { t: '8세기', c: 'type-A' }, { t: '10~11세기', c: 'type-A' }, { t: '14세기', c: 'type-A' },
                    { t: '화강암', c: 'type-B' }, { t: '화강암', c: 'type-B' }, { t: '돌, 금동', c: 'type-B' }, { t: '대리석', c: 'type-B' },
                    { t: '2단 3층', c: 'type-B' }, { t: '층 구분 없음 (2단)', c: 'type-B' }, { t: '1단 9층', c: 'type-B' }, { t: '3단 10층', c: 'type-B' },
                    { t: '모범적 석탑', c: 'type-C' }, { t: '이형탑', c: 'type-C' }, { t: '고려 귀족적', c: 'type-C' }, { t: '라마교 영향', c: 'type-C' },
                    { t: '단순함 (남성적)', c: 'type-C' }, { t: '장식적 (여성적)', c: 'type-C' }, { t: '다각다층', c: 'type-C' }, { t: '파격적인 형태', c: 'type-C' }
                ]
            },
            {
                title: "🔒 3단계: 흙과 불의 예술, 도자기",
                headers: ["구분", "고려 청자", "조선 분청사기", "조선 백자"],
                images: ["", "청자상감운학문매벙.png", "분청박지모란문편병.png", "백자병.png"],
                rows: [
                    { label: "시대", cells: [ ["고려시대"], ["조선시대 (초)"], ["조선시대"] ] },
                    { label: "흙", cells: [ ["청자토"], ["분청토"], ["백자토"] ] },
                    { label: "유약", cells: [ ["청록색 유약"], ["회색 유약"], ["백색 유약"] ] },
                    { label: "특징", cells: [ ["화려한 무늬", "우아하고 세련됨"], ["소박한 무늬", "실용적인 형태"], ["절제된 무늬", "단순하고 절제됨"] ] }
                ],
                keywords: [
                    { t: '고려시대', c: 'type-A' }, { t: '조선시대 (초)', c: 'type-A' }, { t: '조선시대', c: 'type-A' },
                    { t: '청자토', c: 'type-B' }, { t: '분청토', c: 'type-B' }, { t: '백자토', c: 'type-B' },
                    { t: '청록색 유약', c: 'type-B' }, { t: '회색 유약', c: 'type-B' }, { t: '백색 유약', c: 'type-B' },
                    { t: '화려한 무늬', c: 'type-C' }, { t: '소박한 무늬', c: 'type-C' }, { t: '절제된 무늬', c: 'type-C' },
                    { t: '우아하고 세련됨', c: 'type-C' }, { t: '실용적인 형태', c: 'type-C' }, { t: '단순하고 절제됨', c: 'type-C' }
                ]
            },
            {
                title: "🔒 4단계: 천년을 이어온 나전칠기",
                headers: ["구분", "나전칠기(개요)", "옻칠(재료)", "줄음질(기법)", "끊음질(기법)"],
                images: [
                    "", 
                    "https://cdn-icons-png.flaticon.com/512/7594/7594246.png", 
                    "https://cdn-icons-png.flaticon.com/512/1598/1598191.png", 
                    "https://cdn-icons-png.flaticon.com/512/1004/1004386.png", 
                    "https://cdn-icons-png.flaticon.com/512/1004/1004386.png"
                ],
                rows: [
                    { label: "정의/재료", cells: [ ["자개 (조개 껍질)"], ["옻나무 수액"], ["실톱/칼 사용"], ["상사(가느다란 자개)"] ] },
                    { label: "주요 특징", cells: [ ["오묘한 빛깔"], ["방습 및 방수"], ["곡선 무늬 표현"], ["기하학적 무늬"] ] },
                    { label: "상세 설명", cells: [ ["전통 공예의 정수"], ["부패 방지/해충 예방"], ["도안대로 오려내기"], ["잘게 끊어 붙이기"] ] }
                ],
                keywords: [
                    { t: '자개 (조개 껍질)', c: 'type-A' }, { t: '옻나무 수액', c: 'type-A' }, { t: '전통 공예의 정수', c: 'type-A' },
                    { t: '오묘한 빛깔', c: 'type-C' }, { t: '방습 및 방수', c: 'type-C' }, { t: '부패 방지/해충 예방', c: 'type-C' },
                    { t: '실톱/칼 사용', c: 'type-B' }, { t: '곡선 무늬 표현', c: 'type-B' }, { t: '도안대로 오려내기', c: 'type-B' },
                    { t: '상사(가느다란 자개)', c: 'type-B' }, { t: '기하학적 무늬', c: 'type-B' }, { t: '잘게 끊어 붙이기', c: 'type-B' }
                ]
            }
        ];

        function startGame() {
            groupName = document.getElementById('groupName').value.trim();
            if(!groupName) { alert("조 이름을 입력해주세요!"); return; }
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameArea').style.display = 'block';
            updateStatusToFirebase();
            renderStage();
        }

        function updateStatusToFirebase(isClear = false) {
            db.ref('escapeStatus/' + groupName).set({
                stage: isClear ? "🎉 탈출 성공!" : (currentStage + 1) + "단계 진행 중",
                lastUpdate: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function renderStage() {
            // 🔥 스테이지 렌더링 시 상태 초기화 및 버튼 디자인 복구
            isStageCleared = false;
            const btn = document.getElementById('checkBtn');
            btn.innerText = "✅ 정답 확인";
            btn.style.backgroundColor = "#4caf50";
            btn.style.boxShadow = "0 4px 0 #388e3c";
            
            const data = stages[currentStage];
            document.getElementById('stageTitle').innerText = data.title;
            
            let tableHTML = '<table><thead><tr>';
            tableHTML += `<th>${data.headers[0]}</th>`;
            for(let i=1; i<data.headers.length; i++) {
                tableHTML += `<th><img src="${data.images[i]}" class="table-img"><br>${data.headers[i]}</th>`;
            }
            tableHTML += '</tr></thead><tbody>';
            
            data.rows.forEach((row, rIdx) => {
                tableHTML += `<tr><td class="row-label">${row.label}</td>`;
                row.cells.forEach((cellAnswers, cIdx) => {
                    tableHTML += `<td><div class="drop-zone" id="cell-${rIdx}-${cIdx}" data-answers='${JSON.stringify(cellAnswers)}'></div></td>`;
                });
                tableHTML += '</tr>';
            });
            tableHTML += '</tbody></table>';
            
            document.getElementById('tableContainer').innerHTML = tableHTML;

            const pool = document.getElementById('pool');
            pool.innerHTML = '';
            [...data.keywords].sort(() => Math.random() - 0.5).forEach(kw => {
                const el = document.createElement('div');
                el.className = `item ${kw.c}`;
                el.innerText = kw.t;
                el.draggable = true;

                el.addEventListener('dragstart', () => { if(!isStageCleared) selectedItem = el; });
                el.addEventListener('dragend', () => { selectedItem = null; });
                el.onclick = (e) => { 
                    if(isStageCleared) return;
                    e.stopPropagation(); 
                    if(selectedItem) selectedItem.classList.remove('selected'); 
                    selectedItem = el; 
                    el.classList.add('selected'); 
                };
                pool.appendChild(el);
            });

            setupDropZones();
        }

        function setupDropZones() {
            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.addEventListener('dragover', e => { if(!isStageCleared){ e.preventDefault(); zone.classList.add('dragover'); } });
                zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                zone.addEventListener('drop', e => {
                    if(!isStageCleared) {
                        e.preventDefault();
                        zone.classList.remove('dragover');
                        if (selectedItem) zone.appendChild(selectedItem);
                    }
                });

                zone.addEventListener('click', () => {
                    if (!isStageCleared && selectedItem) {
                        zone.appendChild(selectedItem);
                        selectedItem.classList.remove('selected');
                        selectedItem = null;
                    }
                });
            });

            const pool = document.getElementById('pool');
            pool.addEventListener('click', () => {
                if (!isStageCleared && selectedItem) {
                    pool.appendChild(selectedItem);
                    selectedItem.classList.remove('selected');
                    selectedItem = null;
                }
            });
            pool.addEventListener('dragover', e => { if(!isStageCleared) e.preventDefault(); });
            pool.addEventListener('drop', e => { if(!isStageCleared){ e.preventDefault(); if(selectedItem) pool.appendChild(selectedItem); } });
        }

        document.getElementById('checkBtn').onclick = () => {
            // 🔥 이미 클리어한 상태(완성본 모드)에서 버튼을 누르면 다음 단계로 진행
            if (isStageCleared) {
                if (currentStage < stages.length - 1) {
                    currentStage++;
                    updateStatusToFirebase();
                    renderStage();
                } else {
                    updateStatusToFirebase(true);
                    document.getElementById('checkBtn').style.display = 'none';
                    document.getElementById('pool').innerHTML = '<h2 style="color:#4ade80; text-align:center; width:100%; margin:0;">🎉 방탈출 성공! 조형사 탐정단 미션을 완벽히 마스터했습니다! 🎉</h2>';
                }
                return;
            }

            // 채점 로직
            let allCorrect = true;
            document.querySelectorAll('.drop-zone').forEach(zone => {
                const correctAnswers = JSON.parse(zone.getAttribute('data-answers'));
                const itemsInZone = zone.querySelectorAll('.item');

                itemsInZone.forEach(item => {
                    item.classList.remove('correct', 'wrong');
                    if (correctAnswers.includes(item.innerText)) {
                        item.classList.add('correct');
                    } else {
                        item.classList.add('wrong');
                        allCorrect = false;
                        setTimeout(() => {
                            document.getElementById('pool').appendChild(item);
                            item.classList.remove('wrong');
                        }, 500);
                    }
                });
            });

            // 모두 맞았을 때 (완성본 모드로 전환)
            if (allCorrect && document.getElementById('pool').querySelectorAll('.item').length === 0) {
                isStageCleared = true; // 상태 변경
                
                // 단어들 드래그 비활성화
                document.querySelectorAll('.item').forEach(item => {
                    item.draggable = false;
                    item.style.cursor = 'default';
                });

                // 안내 메시지 및 버튼 변경
                const pool = document.getElementById('pool');
                pool.innerHTML = '<h2 style="color:#4ade80; margin:0; width:100%;">🎉 정답입니다! 완성된 표를 학습지에 모두 적은 후 아래 버튼을 누르세요. 🎉</h2>';
                
                const btn = document.getElementById('checkBtn');
                btn.innerText = "➡️ 다 적었어요! 다음 단계로";
                btn.style.backgroundColor = "#2196f3"; // 파란색으로 변경
                btn.style.boxShadow = "0 4px 0 #1565c0";
                
            } else if (allCorrect && document.getElementById('pool').querySelectorAll('.item').length > 0) {
                alert("🤔 아직 채우지 못한 빈칸이 있습니다! 키워드를 모두 표 안에 넣어주세요.");
            }
        };
